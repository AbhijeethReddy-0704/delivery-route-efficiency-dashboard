services:
  dashboard:
    build: .
    container_name: delivery-route-dashboard
    ports:
      - "8501:8501"
    command: >
      sh -c "python scripts/generate_data.py &&
             python scripts/build_sqlite_db.py &&
             streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0"
